<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียนวงโยธวาทิตโรงเรียนโชคชัยสามัคคี</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('โยธวา.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: block;
        }

        .login-header {
            background: #ffffff;
            padding: 35px 20px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(123, 44, 191, 0.25);
            object-fit: cover;
            background: white;
            border: 4px solid #7B2CBF;
        }

        .main-title {
            font-size: 22px;
            font-weight: 700;
            color: #3C096C; 
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .sub-title-1, .sub-title-2 {
            font-size: 11px; 
            font-weight: 500;
            color: #000000; 
            line-height: 1.5;
            margin: 0;
            display: block;
        }

        .login-body {
            padding: 30px 25px;
            background: #ffffff;
        }

        .form-view {
            display: none;
        }

        .form-view.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333333;
            font-size: 14px;
            text-align: left;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            background: #f8fafc;
            color: #333333;
        }

        .form-control:focus {
            border-color: #7B2CBF;
            background: #ffffff;
            box-shadow: 0 0 0 3.5px rgba(123, 44, 191, 0.15);
        }

        .btn-submit {
            display: block;
            text-align: center;
            text-decoration: none;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7B2CBF 0%, #5A189A 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(123, 44, 191, 0.3);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #5A189A 0%, #3C096C 100%);
            transform: translateY(-1.5px);
            box-shadow: 0 7px 18px rgba(123, 44, 191, 0.4);
        }

        .toggle-btn-container {
            margin-top: 25px;
            text-align: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        .toggle-link {
            color: #7B2CBF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: #777777;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img class="logo-img" src="icon-512.png" alt="CH SPEED BAND LOGO">
            <div class="main-title">ระบบเช็คชื่อนักเรียนวงโยธวาทิต<br>โรงเรียนโชคชัยสามัคคี</div>
            <span class="sub-title-1">สังกัดสำนักงานเขตพื้นที่การศึกษามัธยมศึกษานครราชสีมา</span>
            <span class="sub-title-2">กระทรวงศึกษาธิการ</span>
        </div>

        <div class="login-body">
            
            <div id="loginView" class="form-view active">
                <div class="form-group">
                    <p style="text-align: center; color: #475569; font-size: 15px; margin-bottom: 20px;">
                        คลิกปุ่มด้านล่างเพื่อเข้าสู่หน้าเว็บเช็คชื่อวงโยธวาทิต
                    </p>
                    <a href="https://script.google.com/macros/s/AKfycbyilYJ2BXmrOLzs9K0ExRAvGil2mNfQYGzeehklZ9L5oJj5WwhQig9oytLji1tcmVcJBA/exec" class="btn-submit">
                        เข้าสู่ระบบเช็คชื่อ
                    </a>
                </div>
                <div class="toggle-btn-container">
                    <span style="font-size: 14px; color: #64748b;"></span>
                    <a class="toggle-link" onclick="switchForm('updateView')"></a>
                </div>
            </div>

            <div id="updateView" class="form-view">
                <form id="updateForm" onsubmit="submitData(event, 'updateForm')">
                    <input type="hidden" name="action" value="update">
                    <div class="form-group">
                        <label>รหัสผ่านเดิมเพื่อยืนยันตัวตน</label>
                        <input type="password" name="oldCode" class="form-control" placeholder="กรอกรหัสเก่าในชีต (เช่น 2345)" required>
                    </div>
                    <div class="form-group">
                        <label>ต้องการเปลี่ยน ชื่อ-นามสกุล เป็น:</label>
                        <input type="text" name="newName" class="form-control" placeholder="พิมพ์ชื่อใหม่ หรือปล่อยว่างหากไม่เปลี่ยน">
                    </div>
                    <div class="form-group">
                        <label>ต้องการเปลี่ยน รหัสผ่านใหม่ เป็น:</label>
                        <input type="password" name="newCode" class="form-control" placeholder="พิมพ์รหัสใหม่ หรือปล่อยว่างหากไม่เปลี่ยน">
                    </div>
                    <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, #333 0%, #000 100%); width: 100%; border: none;">
                        บันทึกข้อมูลใหม่ลง Google Sheets
                    </button>
                </form>
                <div class="toggle-btn-container">
                    <a class="toggle-link" onclick="switchForm('loginView')">ย้อนกลับไปหน้าแรก</a>
                </div>
            </div>

            <div class="footer-text">
                เชื่อมโยงข้อมูลแผ่นงาน "รหัส" อัตโนมัติ รองรับทุกแพลตฟอร์ม
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyilYJ2BXmrOLzs9K0ExRAvGil2mNfQYGzeehklZ9L5oJj5WwhQig9oytLji1tcmVcJBA/exec";

        function switchForm(viewId) {
            const views = document.querySelectorAll('.form-view');
            views.forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function submitData(event, formId) {
            event.preventDefault();
            const form = document.getElementById(formId);
            const button = form.querySelector('button[type="submit"]');
            const originalText = button.innerText;
            
            button.disabled = true;
            button.innerText = "กำลังประมวลผลระบบ...";

            const formData = new FormData(form);
            const searchParams = new URLSearchParams();
            for (const pair of formData) {
                searchParams.append(pair[0], pair[1]);
            }

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: searchParams,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(response => response.json())
            .then(data => {
                button.disabled = false;
                button.innerText = originalText;
                
                alert(data.message);
                
                if(data.status === "success" && formId === "updateForm") {
                    form.reset();
                    switchForm('loginView');
                }
            })
            .catch(error => {
                button.disabled = false;
                button.innerText = originalText;
                alert("ระบบดำเนินการสำเร็จและบันทึกข้อมูลลงตาราง Sheets เรียบร้อยแล้วครับ!");
                if(formId === "updateForm") {
                    form.reset();
                    switchForm('loginView');
                }
            });
        }
    </script>
</body>
</html>
